version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: task_mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: task_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
  
  frontend:
    build: ./frontend
    container_name: task_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data: